{% extends 'base.html' %}

{% block title %}Liste des Pharmacies - EASYPHARMA{% endblock %}

{% block content %}
<div class="card">
    <h1>🏥 LISTE DES PHARMACIES</h1>

    <table class="table table-striped table-bordered">
        <thead class="table-dark">
            <tr>
                <th>Nom</th>
                <th>Adresse</th>
                <th>Contact</th>
            </tr>
        </thead>

        <tbody>
            {% for p in pharmacies %}
            <tr>
                <td>{{ p.name }}</td>
                <td>{{ p.address }}</td>
                <td>{{ p.contact }}</td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="3">Aucune pharmacie enregistrée.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
