<!DOCTYPE html>
<html>
<head>
    <title>Supprimer Stock</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="p-4">
<h1>Supprimer le stock</h1>

<p>Voulez-vous vraiment supprimer le stock du médicament <strong>{{ stock.medicine.name }}</strong> pour la pharmacie <strong>{{ stock.pharmacy.name }}</strong> ?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Supprimer</button>
    <a href="{% url 'dashboard' %}" class="btn btn-secondary">Annuler</a>
</form>
</body>
</html>
